#    map-underscore-to-camel-case: false
mybatis-plus:
#  type-aliases-package: cn.scnu.voice.web.mapper # 别名扫描包
  mapper-locations: classpath*:/mapper/**/*.xml # Mapper.xml文件地址，默认值
  global-config:
    db-config:
      id-type: auto # 指定 id 的生成方式
  configuration:
    map-underscore-to-camel-case: false # 是否开启下划线和驼峰的映射
    cache-enabled: false # 是否开启二级缓存

springdoc:
  api-docs:
    #是否开启文档功能，默认为true，可不配置
    enabled: true
  swagger-ui:
    # 访问ip:host/api，可直接访问Swagger springdoc
    path: /api
    enabled: true